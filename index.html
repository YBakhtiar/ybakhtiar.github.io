<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قرآن کریم</title>
    <style>
        body {
            background-color: #1e272e;
            font-family: Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 140px;
            min-width: 140px;
            background-color: #111418;
            height: 100vh;
            overflow-y: auto;
            box-shadow: -3px 0 10px rgba(0,0,0,0.5);
            padding: 15px 0;
            scrollbar-width: thin;
            scrollbar-color: #d4af37 #111418;
            z-index: 10;
        }
        .sidebar-title {
            color: #d4af37;
            text-align: center;
            margin-bottom: 15px;
            font-size: 16px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
        }
        .sidebar button {
            display: block;
            width: 80%;
            margin: 6px auto;
            padding: 8px;
            background-color: #2f3640;
            color: white;
            border: 1px solid #d4af37;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
        .sidebar button:hover {
            background-color: #d4af37;
            color: #1e272e;
            font-weight: bold;
        }
        
        #juzList {
            display: flex;
            flex-direction: column;
        }

        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            overflow-y: auto;
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 70px;
            box-sizing: border-box;
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            background-color: white;
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: #d4af37;
            border: 1px solid #d4af37;
            font-size: 30px;
            cursor: pointer;
            padding: 15px 20px;
            border-radius: 10px;
            transition: 0.3s;
            z-index: 100;
        }
        .nav-btn:hover {
            background-color: #d4af37;
            color: #1e272e;
            transform: translateY(-50%) scale(1.1);
        }
        .right-btn { right: 20px; }
        .left-btn { left: 20px; }


        @media screen and (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                min-height: auto;
                padding: 10px 0;
                display: flex;
                flex-direction: row;
                align-items: center;
                box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            }
            .sidebar-title {
                display: none;
            }
            #juzList {
                flex-direction: row;
                overflow-x: auto;
                padding: 0 10px;
                scrollbar-width: none;
            }
            #juzList::-webkit-scrollbar {
                display: none;
            }
            .sidebar button {
                width: auto;
                margin: 0 5px;
                padding: 8px 15px;
                white-space: nowrap;
            }

            .main-content {
                height: auto;
                align-items: flex-start;
                padding-bottom: 100px;
            }

            .quran-container {
                flex-direction: column;
                height: auto;
                padding: 20px 10px;
                gap: 20px;
            }

            .page {
                max-width: 95%;
                height: auto;
            }

            .nav-btn {
                position: fixed;
                top: auto;
                bottom: 20px;
                transform: none;
                font-size: 24px;
                padding: 12px 25px;
                border-radius: 50px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            }
            .nav-btn:hover {
                transform: scale(1.05);
            }
            .right-btn { right: 20px; }
            .left-btn { left: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        <div id="juzList"></div>
    </div>

    <div class="main-content">
        <button class="nav-btn right-btn" onclick="prevPage()" title="صفحه قبل">&#10094;</button>

        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست">
            <img id="leftPage" class="page" alt="صفحه چپ">
        </div>

        <button class="nav-btn left-btn" onclick="nextPage()" title="صفحه بعد">&#10095;</button>
    </div>

    <script>
        const totalPages = 623;
        let currentPage = 1;

        const juzListDiv = document.getElementById("juzList");
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 30) {
                startPage = 587; 
            } else {
                startPage = 3 + ((i - 1) * 20);
            }
            
            let btn = document.createElement("button");
            btn.innerText = "جزء " + i;
            
            btn.onclick = function() {
                let targetPage = startPage;
                if (targetPage % 2 === 0) {
                    targetPage -= 1; 
                }
                currentPage = targetPage;
                updatePages();
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
            };
            juzListDiv.appendChild(btn);
        }

        // تابع فرمت کردن عدد به شکل سه‌رقمی (مثلا تبدیل 1 به 001)
        function formatPageNumber(num) {
            return String(num).padStart(3, '0');
        }

        function updatePages() {
            let rightPageNum = currentPage;
            if (rightPageNum % 2 === 0) {
                rightPageNum -= 1;
            }

            // استفاده از تابع جدید برای تولید نام فایل: Quran001.jpg
            document.getElementById("rightPage").src = "Quran" + formatPageNumber(rightPageNum) + ".jpg";
            
            let leftPageNum = rightPageNum + 1;
            if (leftPageNum <= totalPages) {
                document.getElementById("leftPage").src = "Quran" + formatPageNumber(leftPageNum) + ".jpg";
                document.getElementById("leftPage").style.display = "block";
            } else {
                document.getElementById("leftPage").style.display = "none";
            }
            
            currentPage = rightPageNum;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() {
            if (currentPage + 2 <= totalPages) {
                currentPage += 2;
                updatePages();
            }
        }

        function prevPage() {
            if (currentPage - 2 >= 1) {
                currentPage -= 2;
                updatePages();
            } else if (currentPage === 2) {
                currentPage = 1;
                updatePages();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                nextPage(); 
            } else if (event.key === 'ArrowRight') {
                prevPage(); 
            }
        });

        window.onload = updatePages;
    </script>
</body>
</html>
