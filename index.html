<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff" id="theme-color-meta">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="القرآن">
    <title>القرآن الكريم</title>
    <!-- فونت وزیرمتن از Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- فونت وزیر به عنوان پشتیبان -->
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet" type="text/css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <style>
        /* متغیرهای رنگ - تم روز (پیش‌فرض) */
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border-light: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --button-bg: rgba(255, 255, 255, 0.7);
            --button-hover: rgba(255, 255, 255, 0.9);
            --accent-color: #2563eb;
            --accent-soft: rgba(37, 99, 235, 0.1);
            --danger-color: #dc2626;
            --danger-soft: rgba(220, 38, 38, 0.1);
            --success-color: #16a34a;
            --splash-bg: rgba(255, 255, 255, 0.6);
            --juz-card-bg: rgba(255, 255, 255, 0.7);
            --modal-bg: #ffffff;
            --image-filter: none;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --blur-amount: 12px;
            --transition-fast: 0.2s ease;
            --transition-base: 0.3s ease;
        }

        /* تم شب */
        body.night-mode {
            --bg-primary: #0b1120;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --button-bg: rgba(30, 41, 59, 0.7);
            --button-hover: rgba(30, 41, 59, 0.9);
            --accent-color: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.2);
            --danger-color: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.2);
            --success-color: #22c55e;
            --splash-bg: rgba(0, 0, 0, 0.6);
            --juz-card-bg: rgba(30, 41, 59, 0.8);
            --modal-bg: #1e293b;
            --image-filter: var(--night-filter);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.4);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.4);
        }

        /* فیلتر شب */
        body.night-mode {
            --night-filter: var(--night-filter-value);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            overscroll-behavior-y: contain;
            touch-action: none;
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.5;
        }

        /* دکمه‌های ثابت - طراحی مدرن */
        .menu-toggle, .settings-btn, .main-download-btn, .fullscreen-btn {
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            background: var(--button-bg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            z-index: 1002;
            color: var(--text-primary);
            opacity: 0.9;
        }

        .menu-toggle:hover, .settings-btn:hover, .main-download-btn:hover, .fullscreen-btn:hover {
            opacity: 1;
            background: var(--button-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .menu-toggle svg, .settings-btn svg, .main-download-btn svg, .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* دکمه تنظیمات (بالا چپ) */
        .settings-btn {
            position: fixed;
            top: 20px;
            left: 20px;
        }

        /* دکمه فهرست اجزاء (بالا راست) */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
        }

        /* دکمه دانلود (پایین راست) */
        .main-download-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            font-weight: 500;
            gap: 8px;
            padding: 10px 18px;
            color: var(--text-secondary);
        }
        .main-download-btn.done {
            color: var(--success-color);
            border-color: var(--success-color);
            pointer-events: none;
            display: none;
        }

        /* دکمه تمام صفحه (پایین چپ) */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
        }

        .progress-tooltip {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-secondary);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 1002;
        }

        /* مودال‌ها - طراحی کارت مدرن */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 16px;
        }

        .modal-content {
            background: var(--modal-bg);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .modal-content h3 svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .modal-content p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .dl-opt-btn, .theme-toggle-item, .delete-offline-item, .install-btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--button-bg);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .dl-opt-btn:hover, .theme-toggle-item:hover, .delete-offline-item:hover, .install-btn:hover {
            background: var(--button-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .dl-opt-btn .main-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .dl-opt-btn .sub-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .delete-offline-item {
            border-color: var(--danger-color);
            color: var(--danger-color);
            background: var(--danger-soft);
            flex-direction: row;
            justify-content: center;
            gap: 8px;
        }

        .theme-toggle-item {
            background: var(--accent-soft);
            border-color: var(--accent-color);
            flex-direction: row;
            justify-content: center;
            gap: 8px;
            color: var(--accent-color);
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 40px;
            margin-top: 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all var(--transition-base);
            width: 100%;
        }
        .cancel-btn:hover {
            background: var(--button-hover);
            color: var(--text-primary);
        }

        .install-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }
        .install-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .install-instructions {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 16px;
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .install-instructions p {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .install-instructions svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
            margin-top: 3px;
        }

        /* اسپلش مدرن */
        .splash-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--splash-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 16px;
        }
        .splash-card {
            background: var(--juz-card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 48px;
            padding: 40px 32px;
            width: 400px;
            max-width: 100%;
            box-shadow: var(--shadow-xl);
            text-align: center;
            color: var(--text-primary);
            animation: splashFadeIn 0.4s ease;
        }
        @keyframes splashFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .splash-card h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .splash-card .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }
        .splash-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            background: var(--button-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-base);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            font-family: 'Vazirmatn', sans-serif;
        }
        .splash-btn:first-of-type {
            background: var(--accent-soft);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .splash-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: var(--button-hover);
        }
        .telegram-link {
            margin-top: 24px;
            font-size: 12px;
            opacity: 0.7;
        }
        .telegram-link a {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition-fast);
        }
        .telegram-link a:hover {
            color: var(--accent-color);
        }

        /* مودال اجزاء */
        .juz-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            padding: 16px;
        }
        .juz-card {
            background: var(--juz-card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 48px;
            padding: 32px 24px;
            width: 420px;
            max-width: 100%;
            max-height: 80vh;
            box-shadow: var(--shadow-xl);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }
        .juz-card .continue-btn {
            background: var(--accent-soft);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 600;
            padding: 16px;
            border-radius: 40px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .juz-card .continue-btn:hover {
            background: var(--accent-soft);
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .juz-list-container {
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
            padding-left: 4px;
        }
        .juz-list-container::-webkit-scrollbar { width: 4px; }
        .juz-list-container::-webkit-scrollbar-track { background: transparent; }
        .juz-list-container::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
        .juz-item {
            width: 100%;
            padding: 14px;
            margin: 6px 0;
            background: var(--button-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: 'Vazirmatn', sans-serif;
            text-align: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .juz-item:hover {
            background: var(--button-hover);
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        /* تنظیمات شب - داخل مودال */
        .night-settings-container {
            margin: 16px 0;
            border-radius: 24px;
            overflow: hidden;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
        }
        .night-settings-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        .night-settings-toggle:hover {
            background: var(--button-hover);
        }
        .night-settings-toggle .arrow {
            transition: transform 0.3s;
        }
        .night-settings-toggle.active .arrow {
            transform: rotate(180deg);
        }
        .night-settings-panel {
            padding: 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-secondary);
            display: none;
        }
        .night-settings-panel.visible {
            display: block;
        }
        .slider-container {
            margin-bottom: 16px;
        }
        .slider-container label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .slider-container input {
            width: 100%;
            cursor: pointer;
            background: var(--bg-tertiary);
            border-radius: 40px;
            height: 6px;
            -webkit-appearance: none;
        }
        .slider-container input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid var(--bg-primary);
            box-shadow: var(--shadow-sm);
        }
        .slider-value {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .reset-filter-btn {
            background: var(--button-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all var(--transition-fast);
        }
        .reset-filter-btn:hover {
            background: var(--button-hover);
            border-color: var(--border-hover);
        }

        /* محتوای اصلی */
        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 96vh;
            width: 100%;
            padding: 0 60px;
            box-sizing: border-box;
            touch-action: none;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            max-width: 48%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            transition: box-shadow 0.3s ease;
            background: white; /* fallback for pages */
        }
        body.night-mode .page-wrapper {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .page {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 24px;
            background-color: white;
            transform-origin: center center;
            will-change: transform;
            filter: var(--image-filter);
            transition: filter 0.3s ease;
        }

        /* دکمه‌های نویگیشن تمام‌قد با افکت شیشه‌ای */
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            width: 80px;
            background: transparent;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: var(--text-secondary);
            cursor: pointer;
            z-index: 100;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            opacity: 0.6;
            transition: all var(--transition-base);
        }
        .nav-btn:hover {
            opacity: 1;
            background: linear-gradient(to right, var(--button-bg), transparent);
            color: var(--text-primary);
        }
        .right-btn {
            right: 0;
            border-left: 1px solid var(--border-light);
            background: linear-gradient(to left, var(--button-bg), transparent);
        }
        .left-btn {
            left: 0;
            border-right: 1px solid var(--border-light);
            background: linear-gradient(to right, var(--button-bg), transparent);
        }
        .nav-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* ریسپانسیو */
        @media screen and (max-width: 768px) {
            .quran-container { padding: 10px; gap: 0; }
            .page-wrapper { max-width: 100%; width: 100%; height: auto; border-radius: 16px; }
            .page { max-height: 95vh; border-radius: 16px; }
            .nav-btn { display: none !important; }
            .fullscreen-btn { display: none !important; }
            .menu-toggle, .settings-btn, .main-download-btn { padding: 10px; }
            .menu-toggle svg, .settings-btn svg, .main-download-btn svg { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>
    <!-- اسپلش مودال -->
    <div id="splashModal" class="splash-overlay">
        <div class="splash-card">

    <script>
        const totalPages = 623;
        let currentPage = 1;
        let isDownloaded = false;

        let deferredPrompt = null;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

        let currentScale = 1;
        let translateX = 0; let translateY = 0;
        let lastTranslateX = 0; let lastTranslateY = 0;
        let initialPinchDistance = null;
        let isPanning = false;
        let lastTapTime = 0;
        let hasMoved = false; 
        
        let objectUrls = { right: null, left: null };

        // ========== مدیریت تم ==========
        const themeColorMeta = document.getElementById('theme-color-meta');
        const rootStyle = document.documentElement.style;

        const defaultFilter = {
            invert: 0.90,
            brightness: 1.10,
            contrast: 1.05
        };

        let nightFilter = JSON.parse(localStorage.getItem('quran-night-filter')) || defaultFilter;

        function updateNightFilter() {
            const filterString = `invert(${nightFilter.invert}) brightness(${nightFilter.brightness}) contrast(${nightFilter.contrast}) hue-rotate(180deg)`;
            rootStyle.setProperty('--night-filter-value', filterString);
            localStorage.setItem('quran-night-filter', JSON.stringify(nightFilter));
        }

        updateNightFilter();

        function setTheme(mode) {
            if (mode === 'night') {
                document.body.classList.add('night-mode');
                themeColorMeta.setAttribute('content', '#0b1120');
                localStorage.setItem('quran-theme', 'night');
            } else {
                document.body.classList.remove('night-mode');
                themeColorMeta.setAttribute('content', '#ffffff');
                localStorage.setItem('quran-theme', 'day');
            }
            
            // به‌روزرسانی دکمه تغییر تم در مودال تنظیمات
            const themeBtn = document.getElementById('settingsThemeToggle');
            if (themeBtn) {
                themeBtn.innerHTML = '';
                if (document.body.classList.contains('night-mode')) {
                    themeBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <circle cx="12" cy="12" r="5"/>
                            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <line x1="12" y1="1" x2="12" y2="4"/>
                                <line x1="12" y1="20" x2="12" y2="23"/>
                                <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
                                <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
                                <line x1="1" y1="12" x2="4" y2="12"/>
                                <line x1="20" y1="12" x2="23" y2="12"/>
                                <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
                                <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
                            </g>
                        </svg>
                        <span>حالت روز</span>
                    `;
                } else {
                    themeBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79"/>
                        </svg>
                        <span>حالت شب</span>
                    `;
                }
            }
            
            const settingsNightContainer = document.getElementById('settingsNightContainer');
            if (settingsNightContainer) {
                settingsNightContainer.style.display = document.body.classList.contains('night-mode') ? 'block' : 'none';
            }
        }

        function toggleTheme() {
            setTheme(document.body.classList.contains('night-mode') ? 'day' : 'night');
        }

        const savedTheme = localStorage.getItem('quran-theme') || 'day';
        setTheme(savedTheme);

        // ========== Service Worker ==========
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker ثبت شد:', reg))
                    .catch(err => console.log('خطا در ثبت Service Worker:', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) {
                document.getElementById('installPwaBtn').style.display = 'flex';
            }
        });

        document.getElementById('installPwaBtn').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('User response to the install prompt:', outcome);
            deferredPrompt = null;
            document.getElementById('installPwaBtn').style.display = 'none';
        });

        // ======== توابع مودال اجزاء ========
        function openJuzOverlay() {
            document.getElementById('juzOverlay').style.display = 'flex';
            document.getElementById('splashModal').style.display = 'none';
        }
        function closeJuzOverlay() {
            document.getElementById('juzOverlay').style.display = 'none';
        }

        document.getElementById('juzOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeJuzOverlay();
        });

        document.getElementById('downloadModal').addEventListener('click', function(e) {
            if (e.target === this) closeDownloadModal();
        });

        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) closeSettingsModal();
        });

        // ======== توابع اسپلش ========
        function hideSplash() {
            document.getElementById('splashModal').style.display = 'none';
        }

        document.getElementById('continueReadingBtn').addEventListener('click', hideSplash);
        document.getElementById('juzListBtn').addEventListener('click', function() {
            hideSplash();
            openJuzOverlay();
        });
        document.getElementById('continueFromJuzBtn').addEventListener('click', closeJuzOverlay);

        // ======== مقداردهی اولیه ========
        (function initialize() {
            let saved = localStorage.getItem('lastQuranPage');
            if (saved && !isNaN(parseInt(saved))) {
                currentPage = parseInt(saved);
            } else {
                currentPage = 1;
            }
            updatePages();
            document.getElementById('splashModal').style.display = 'flex';
        })();

        // ======== توابع دانلود و کش ========
        function openDownloadModal() { 
            document.getElementById('downloadModal').style.display = 'flex'; 
            if (deferredPrompt && !isStandalone) {
                document.getElementById('installPwaBtn').style.display = 'flex';
            } else {
                document.getElementById('installPwaBtn').style.display = 'none';
            }
        }
        function closeDownloadModal() { document.getElementById('downloadModal').style.display = 'none'; }

        function openSettingsModal() {
            document.getElementById('settingsModal').style.display = 'flex';
        }
        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function setDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            const progress = document.getElementById('progressTooltip');
            if (dlBtn) { dlBtn.style.display = "none"; dlBtn.classList.add('done'); }
            if (progress) progress.style.display = "none";
            isDownloaded = true;
        }

        function resetDownloadedUI() {
            const dlBtn = document.getElementById('mainDownloadBtn');
            if (dlBtn) {
                dlBtn.style.display = "flex"; 
                dlBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>دانلود آفلاین`;
                dlBtn.style.pointerEvents = "auto"; 
                dlBtn.classList.remove('done');
            }
            isDownloaded = false;
        }

        async function startDownload(quality) {
            closeDownloadModal();
            let sizeText = quality === 'hq' ? '۵۰۰ مگابایت' : '۷۰ مگابایت';
            if (!confirm(`آیا مطمئن هستید؟ فایل های آفلاین حدود ${sizeText} حجم دارد.`)) return;
            
            const dlBtn = document.getElementById('mainDownloadBtn');
            const progress = document.getElementById('progressTooltip');
            
            dlBtn.style.pointerEvents = "none"; 
            dlBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>در حال دانلود...`;
            progress.style.display = "block"; progress.style.color = "var(--text-secondary)";
            progress.innerText = "در حال دانلود...";

            const hqBaseUrl = 'https://raw.githubusercontent.com/YBakhtiar/quranh/main/'; 

            try {
                const cache = await caches.open('quran-cache-v1');
                let downloadedCount = 0;
                const batchSize = 10;
                
                for (let i = 1; i <= totalPages; i += batchSize) {
                    const promises = [];
                    for (let j = 0; j < batchSize && (i + j) <= totalPages; j++) {
                        let pageNum = String(i + j).padStart(3, '0');
                        let fileName = 'Quran' + pageNum + '.jpg';
                        
                        let cacheKey = 'images/' + fileName;
                        let fetchUrl = quality === 'hq' ? (hqBaseUrl + fileName) : cacheKey;
                        
                        promises.push(
                            fetch(fetchUrl, { cache: 'reload' })
                                .then(async (response) => {
                                    if (response.ok) {
                                        await cache.put(cacheKey, response.clone());
                                        return true;
                                    }
                                    return false;
                                })
                                .catch(e => false)
                        );
                    }
                    await Promise.all(promises);
                    downloadedCount += batchSize;
                    progress.innerText = 'پیشرفت: ' + Math.min(downloadedCount, totalPages) + ' از ' + totalPages;
                }
                
                setDownloadedUI();
                alert("دانلود با موفقیت انجام شد! اکنون میتوانید به صورت کاملا آفلاین و بدون اینترنت استفاده کنید.");
                updatePages();
                
            } catch (error) {
                progress.innerText = "❌ خطا در دانلود"; progress.style.color = "var(--danger-color)";
                dlBtn.style.pointerEvents = "auto"; 
                dlBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>تلاش مجدد`;
            }
        }

        async function deleteOfflineFiles() {
            if (!confirm("فایل‌های آفلاین حذف شوند؟ تمام فایل های دانلود شده حذف میشوند و برای استفاده آفلاین باید دوباره دانلود کنید.")) return;
            try {
                const progress = document.getElementById('progressTooltip');
                progress.style.display = "block"; progress.innerText = "در حال حذف...";
                progress.style.color = "var(--text-secondary)";
                
                await caches.delete('quran-cache-v1');
                resetDownloadedUI();
                progress.style.display = "none";
                alert("فایل‌های آفلاین با موفقیت حذف شدند.");
                updatePages(); 
            } catch(e) { alert("خطا در حذف فایل‌ها"); }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function toPersianNum(num) {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        // ======== تولید لیست اجزاء (فقط اجزاء) ========
        const juzListDiv = document.getElementById("juzList");
        
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 1) startPage = 3; else if (i === 30) startPage = 588; else startPage = 4 + ((i - 1) * 20);

            let btn = document.createElement("button"); 
            btn.className = "juz-item";
            btn.innerText = "جزء " + toPersianNum(i);
            btn.onclick = function() {
                let targetPage = startPage;
                if (window.innerWidth > 768 && targetPage % 2 === 0) targetPage -= 1;
                currentPage = targetPage; 
                updatePages();
                closeJuzOverlay();
            };
            juzListDiv.appendChild(btn);
        }

        // ======== راه‌اندازی تنظیمات مودال تنظیمات ========
        (function setupSettingsModal() {
            const themeToggle = document.getElementById('settingsThemeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }

            const nightToggle = document.getElementById('settingsNightToggle');
            const nightPanel = document.getElementById('settingsNightPanel');
            if (nightToggle && nightPanel) {
                nightToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    nightPanel.classList.toggle('visible');
                    nightToggle.classList.toggle('active');
                });
            }

            const invertSlider = document.getElementById('settingsInvertSlider');
            const brightnessSlider = document.getElementById('settingsBrightnessSlider');
            const contrastSlider = document.getElementById('settingsContrastSlider');
            const invertVal = document.getElementById('settingsInvertVal');
            const brightnessVal = document.getElementById('settingsBrightnessVal');
            const contrastVal = document.getElementById('settingsContrastVal');

            function updateSlidersAndFilter() {
                nightFilter.invert = parseFloat(invertSlider.value);
                nightFilter.brightness = parseFloat(brightnessSlider.value);
                nightFilter.contrast = parseFloat(contrastSlider.value);
                invertVal.textContent = nightFilter.invert.toFixed(2);
                brightnessVal.textContent = nightFilter.brightness.toFixed(2);
                contrastVal.textContent = nightFilter.contrast.toFixed(2);
                updateNightFilter();
            }

            if (invertSlider) {
                invertSlider.value = nightFilter.invert;
                brightnessSlider.value = nightFilter.brightness;
                contrastSlider.value = nightFilter.contrast;
                invertVal.textContent = nightFilter.invert.toFixed(2);
                brightnessVal.textContent = nightFilter.brightness.toFixed(2);
                contrastVal.textContent = nightFilter.contrast.toFixed(2);

                invertSlider.addEventListener('input', updateSlidersAndFilter);
                brightnessSlider.addEventListener('input', updateSlidersAndFilter);
                contrastSlider.addEventListener('input', updateSlidersAndFilter);
            }

            const resetBtn = document.getElementById('settingsResetFilterBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
                    nightFilter = { ...defaultFilter };
                    invertSlider.value = nightFilter.invert;
                    brightnessSlider.value = nightFilter.brightness;
                    contrastSlider.value = nightFilter.contrast;
                    updateSlidersAndFilter();
                });
            }

            const deleteBtn = document.getElementById('settingsDeleteOfflineBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', deleteOfflineFiles);
            }
        })();

        // ======== توابع مدیریت صفحات ========
        function formatPageNumber(num) { return String(num).padStart(3, '0'); }

        function applyTransform(withTransition = false) {
            const rightWrapper = document.getElementById('rightWrapper');
            const leftWrapper = document.getElementById('leftWrapper');
            const transformStyle = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
            [rightWrapper, leftWrapper].forEach(wrapper => {
                if(wrapper) {
                    wrapper.style.transition = withTransition ? 'transform 0.3s ease-out' : 'none';
                    wrapper.style.transform = transformStyle;
                }
            });
        }

        function resetZoom() {
            currentScale = 1; translateX = 0; translateY = 0; lastTranslateX = 0; lastTranslateY = 0;
            applyTransform(true);
        }

        async function loadPageImage(imgElementId, urlPath, side) {
            const img = document.getElementById(imgElementId);
            if (!img) return;

            if (objectUrls[side]) { URL.revokeObjectURL(objectUrls[side]); objectUrls[side] = null; }

            try {
                const cache = await caches.open('quran-cache-v1');
                const response = await cache.match(urlPath);
                if (response) {
                    const blob = await response.blob();
                    const objUrl = URL.createObjectURL(blob);
                    objectUrls[side] = objUrl; img.src = objUrl;
                } else { img.src = urlPath; }
            } catch (e) { img.src = urlPath; }
        }

        function updatePages() {
            resetZoom(); 
            let isMobile = window.innerWidth <= 768;
            const rightWrapper = document.getElementById('rightWrapper');
            const leftWrapper = document.getElementById('leftWrapper');
            const leftImg = document.getElementById('leftPage');

            if (isMobile) {
                let url = 'images/Quran' + formatPageNumber(currentPage) + '.jpg';
                loadPageImage("rightPage", url, 'right');
                leftWrapper.style.display = 'none';
                rightWrapper.style.display = 'flex';
            } else {
                let rightPageNum = (currentPage % 2 !== 0) ? currentPage : currentPage - 1;
                let leftPageNum = rightPageNum + 1;

                let rightUrl = 'images/Quran' + formatPageNumber(rightPageNum) + '.jpg';
                loadPageImage("rightPage", rightUrl, 'right');

                if (leftPageNum <= totalPages) {
                    let leftUrl = 'images/Quran' + formatPageNumber(leftPageNum) + '.jpg';
                    loadPageImage("leftPage", leftUrl, 'left');
                    leftWrapper.style.display = 'flex';
                } else {
                    leftWrapper.style.display = 'none';
                }

                rightWrapper.style.display = 'flex';
                
                if (currentPage % 2 === 0) currentPage = rightPageNum;
            }
            
            try { localStorage.setItem('lastQuranPage', currentPage.toString()); } catch(e) {}
            try { if (window.location.protocol !== 'file:') history.replaceState(null, null, '#' + currentPage); } catch(e) {}
        }

        function nextPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage + step <= totalPages) currentPage += step;
            else if (currentPage < totalPages) currentPage++;
            updatePages();
        }

        function prevPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage - step >= 1) currentPage -= step;
            else if (currentPage > 1) currentPage--;
            updatePages();
        }

        // رویدادهای لمسی
        let touchstartX = 0; let touchstartY = 0; let touchendX = 0; let touchendY = 0; let touchStartTime = 0;
        const swipeArea = document.getElementById('swipeArea');
        
        swipeArea.addEventListener('touchstart', e => {
            if (e.touches.length >= 2) {
                initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                isPanning = false; 
            } else if (e.touches.length === 1) {
                touchstartX = e.touches[0].clientX; touchstartY = e.touches[0].clientY;
                touchStartTime = new Date().getTime(); hasMoved = false; 
                if (currentScale > 1) isPanning = true;
            }
        }, {passive: false});

        swipeArea.addEventListener('touchmove', e => {
            e.preventDefault(); hasMoved = true; 
            if (e.touches.length >= 2 && initialPinchDistance) {
                let currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                let scaleChange = currentDistance / initialPinchDistance;
                currentScale = Math.min(Math.max(1, currentScale * scaleChange), 4);
                initialPinchDistance = currentDistance; 
                applyTransform(false);
            } else if (e.touches.length === 1 && isPanning && currentScale > 1) {
                let deltaX = e.touches[0].clientX - touchstartX; let deltaY = e.touches[0].clientY - touchstartY;
                translateX = lastTranslateX + deltaX; translateY = lastTranslateY + deltaY;
                applyTransform(false);
            }
        }, {passive: false});

        swipeArea.addEventListener('touchend', e => {
            if (e.touches.length > 0) {
                initialPinchDistance = null;
                if (e.touches.length === 1 && currentScale > 1) {
                    touchstartX = e.touches[0].clientX; touchstartY = e.touches[0].clientY;
                    lastTranslateX = translateX; lastTranslateY = translateY; isPanning = true;
                }
                return; 
            }

            initialPinchDistance = null;
            if (isPanning) { lastTranslateX = translateX; lastTranslateY = translateY; isPanning = false; }

            if (!hasMoved) {
                let currentTime = new Date().getTime(); let tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) { resetZoom(); lastTapTime = 0; return; }
                lastTapTime = currentTime;
            } else { lastTapTime = 0; }

            if (currentScale <= 1.05 && e.changedTouches.length === 1 && hasMoved) {
                touchendX = e.changedTouches[0].clientX; touchendY = e.changedTouches[0].clientY;
                let diffX = Math.abs(touchendX - touchstartX); let diffY = Math.abs(touchendY - touchstartY);
                let timeDiff = new Date().getTime() - touchStartTime;
                
                if (diffX > 80 && diffX > diffY * 2 && timeDiff < 600) {
                    if (touchendX > touchstartX) nextPage(); else prevPage(); 
                }
            }
        }, {passive: false});

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowRight') { e.preventDefault(); prevPage(); }
        });

        window.addEventListener('orientationchange', function() {
            setTimeout(updatePages, 50);
        });

        window.addEventListener('resize', updatePages);

        document.addEventListener('DOMContentLoaded', function() {
            caches.open('quran-cache-v1').then(cache => {
                cache.match('images/Quran001.jpg').then(res => { if (res) setDownloadedUI(); });
            });
        });
    </script>
</body>
