<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vazirmatn/33.0.0/Vazirmatn-font-face.min.css">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet" type="text/css">

    <style>
        body {
            background-color: #0d1622;
            font-family: 'Vazirmatn', 'Vazir', 'B Yekan', Tahoma, Arial, sans-serif !important;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(13, 22, 34, 0.5);
            color: #7a8ea3;
            border: 1px solid #233446;
            font-size: 22px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            /* شفافیت دکمه منو به ۵۰ درصد تغییر کرد */
            opacity: 0.5;
            transition: all 0.4s ease;
            z-index: 1002;
        }
        
        .menu-toggle:hover {
            opacity: 1;
            background-color: #1e2f42;
            color: #cfddec;
            border-color: #3b5068;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -180px; 
            width: 150px;
            background-color: #111d2b;
            height: 100vh;
            overflow-y: auto;
            box-shadow: -3px 0 15px rgba(0,0,0,0.8);
            padding: 80px 0 15px 0; 
            scrollbar-width: thin;
            scrollbar-color: #3b5068 #111d2b;
            z-index: 1001;
            transition: right 0.4s ease-in-out;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-title {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            color: #6a829e;
            text-align: center;
            margin-bottom: 15px;
            font-size: 17px;
            font-weight: bold;
            border-bottom: 1px solid #233446;
            padding-bottom: 10px;
        }
        
        .sidebar button {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            display: block;
            width: 80%;
            margin: 6px auto;
            padding: 8px;
            background-color: #1a2838;
            color: #8da4be;
            border: 1px solid #233446;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }
        
        .sidebar button:hover {
            background-color: #283c52;
            color: #e2e8f0;
        }
        
        #juzList {
            display: flex;
            flex-direction: column;
        }

        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0d1622;
            overflow-y: auto;
            width: 100%;
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 5px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
            background-color: white;
            transition: filter 0.3s;
        }
        
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            background-color: rgba(13, 22, 34, 0.2);
            color: #5c748c;
            padding: 0 8px; 
            cursor: pointer;
            z-index: 100;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            /* شفافیت به ۷۰ درصد کاهش یافت تا کمتر به چشم بیاید */
            opacity: 0.7;
            transition: 0.3s;
        }
        
        .nav-btn:hover {
            background-color: rgba(30, 47, 66, 0.8);
            color: #cfddec;
            /* وقتی موس روی آن می‌رود کاملاً واضح می‌شود */
            opacity: 1;
        }
        
        .right-btn { 
            right: 0; 
            border-radius: 12px 0 0 12px;
        }
        
        .left-btn { 
            left: 0; 
            border-radius: 0 12px 12px 0;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: rgba(13, 22, 34, 0.5);
            color: #7a8ea3;
            border: 1px solid #233446;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 18px; 
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 0;
            padding: 0;
            cursor: pointer;
            opacity: 0.3;
            z-index: 1000;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        .fullscreen-btn:hover {
            opacity: 1;
            background-color: #1e2f42;
            color: #cfddec;
            border-color: #3b5068;
            transform: scale(1.1);
        }

        @media screen and (max-width: 768px) {
            body { overflow: auto; }
            .main-content {
                height: auto;
                align-items: flex-start;
                padding-bottom: 100px;
            }
            .quran-container {
                flex-direction: column;
                height: auto;
                padding: 20px 10px;
                gap: 20px;
            }
            .page {
                max-width: 95%;
                height: auto;
            }
            .nav-btn {
                position: fixed;
                top: auto;
                bottom: 20px;
                height: auto;
                padding: 15px 20px;
                border-radius: 50px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.5);
                font-size: 24px;
            }
            .nav-btn:hover {
                transform: scale(1.05);
            }
            .right-btn { right: 20px; }
            .left-btn { left: 20px; margin-left: 60px; }
            
            .fullscreen-btn {
                bottom: 20px;
                left: 10px;
                width: 45px;
                height: 45px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()" title="فهرست اجزاء">&#9776;</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        <div id="juzList"></div>
    </div>

    <div class="main-content">
        <button class="nav-btn right-btn" onclick="prevPage()" title="صفحه قبل">&#10094;</button>

        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست">
            <img id="leftPage" class="page" alt="صفحه چپ">
        </div>

        <button class="nav-btn left-btn" onclick="nextPage()" title="صفحه بعد">&#10095;</button>
        
        <button class="fullscreen-btn" onclick="toggleFullScreen()" title="تمام صفحه">⤢</button>
    </div>

    <script>
        const totalPages = 623;
        let currentPage = 1;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`خطا در ورود به حالت تمام‌صفحه: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function toPersianNum(num) {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        const juzListDiv = document.getElementById("juzList");
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 30) {
                startPage = 587; 
            } else {
                startPage = 3 + ((i - 1) * 20);
            }
            
            let btn = document.createElement("button");
            btn.innerText = "جزء " + toPersianNum(i);
            
            btn.onclick = function() {
                let targetPage = startPage;
                if (targetPage % 2 === 0) {
                    targetPage -= 1; 
                }
                currentPage = targetPage;
                updatePages();
                
                document.getElementById('sidebar').classList.remove('open');
            };
            juzListDiv.appendChild(btn);
        }

        function formatPageNumber(num) {
            return String(num).padStart(3, '0');
        }

        function updatePages() {
            let rightPageNum = currentPage;
            if (rightPageNum % 2 === 0) {
                rightPageNum -= 1;
            }

            document.getElementById("rightPage").src = "Quran" + formatPageNumber(rightPageNum) + ".jpg";
            
            let leftPageNum = rightPageNum + 1;
            if (leftPageNum <= totalPages) {
                document.getElementById("leftPage").src = "Quran" + formatPageNumber(leftPageNum) + ".jpg";
                document.getElementById("leftPage").style.display = "block";
            } else {
                document.getElementById("leftPage").style.display = "none";
            }
            
            currentPage = rightPageNum;
            
            localStorage.setItem('lastQuranPage', currentPage);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() {
            if (currentPage + 2 <= totalPages) {
                currentPage += 2;
                updatePages();
            }
        }

        function prevPage() {
            if (currentPage - 2 >= 1) {
                currentPage -= 2;
                updatePages();
            } else if (currentPage === 2) {
                currentPage = 1;
                updatePages();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                nextPage(); 
            } else if (event.key === 'ArrowRight') {
                prevPage(); 
            }
        });

        window.onload = function() {
            let savedPage = localStorage.getItem('lastQuranPage');
            if (savedPage) {
                currentPage = parseInt(savedPage, 10);
            }
            updatePages();
        };
    </script>
</body>
</html>
