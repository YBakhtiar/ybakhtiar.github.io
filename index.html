<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>القرآن الكريم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vazirmatn/33.0.0/Vazirmatn-font-face.min.css">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazir/Vazir.css" rel="stylesheet" type="text/css">

    <style>
        body {
            background-color: #0d1622;
            font-family: 'Vazirmatn', 'Vazir', 'B Yekan', Tahoma, Arial, sans-serif !important;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* استایل شیشه‌ای مدرن برای دکمه منو */
        .menu-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05); /* پس‌زمینه بسیار کمرنگ */
            backdrop-filter: blur(12px); /* افکت تار کننده شیشه */
            -webkit-backdrop-filter: blur(12px); /* برای سافاری و iOS */
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.1); /* حاشیه براق شیشه‌ای */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 20px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 14px; /* گوشه‌های گرد مدرن */
            opacity: 0.7; /* شفافیت ملایم */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1002;
        }
        
        .menu-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -200px; /* کمی بیشتر پنهان شود */
            width: 170px;
            background: rgba(17, 29, 43, 0.85); /* پس زمینه نیمه‌شفاف */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            height: 100vh;
            overflow-y: auto;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            padding: 90px 0 20px 0; 
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
            z-index: 1001;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar-title {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            color: #8da4be;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .offline-btn {
            display: block;
            width: 82%;
            margin: 0 auto 20px auto;
            padding: 12px 8px;
            background: linear-gradient(135deg, #1c6abf 0%, #0d4a8c 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(28, 106, 191, 0.3);
            cursor: pointer;
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .offline-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(28, 106, 191, 0.5);
        }
        .offline-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: not-allowed;
            color: #5c748c;
        }
        
        .progress-text {
            color: #8da4be;
            font-size: 12px;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }
        
        .sidebar button.juz-btn {
            font-family: 'Vazirmatn', 'Vazir', Tahoma, sans-serif !important;
            display: block;
            width: 82%;
            margin: 8px auto;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            color: #8da4be;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .sidebar button.juz-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: scale(1.02);
        }
        
        #juzList {
            display: flex;
            flex-direction: column;
        }

        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: transparent;
            overflow-y: auto;
            width: 100%;
        }
        
        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            height: 96vh;
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }
        
        .page {
            height: 100%;
            max-width: 48%;
            object-fit: contain;
            border-radius: 8px; /* کمی گردتر شدن لبه صفحات */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
            transition: filter 0.3s;
        }
        
        /* دکمه‌های ورق زدن با افکت شیشه‌ای روی عکس‌ها */
        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(13, 22, 34, 0.1);
            backdrop-filter: blur(6px); /* تار کردن عکس‌های زیرین */
            -webkit-backdrop-filter: blur(6px);
            color: #8da4be;
            padding: 0 12px; 
            cursor: pointer;
            z-index: 100;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            opacity: 0.6;
            transition: all 0.4s ease;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            opacity: 1;
        }
        
        .right-btn { 
            right: 0; 
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .left-btn { 
            left: 0; 
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* استایل شیشه‌ای مدرن برای دکمه تمام‌صفحه */
        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #cfddec;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 0;
            padding: 0;
            cursor: pointer;
            opacity: 0.6;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .fullscreen-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        @media screen and (max-width: 768px) {
            body { overflow: auto; }
            .main-content {
                height: auto;
                align-items: flex-start;
                padding-bottom: 100px;
            }
            .quran-container {
                flex-direction: column;
                height: auto;
                padding: 20px 10px;
                gap: 20px;
            }
            .page {
                max-width: 95%;
                height: auto;
            }
            .nav-btn {
                position: fixed;
                top: auto;
                bottom: 25px;
                height: auto;
                padding: 15px 22px;
                border-radius: 25px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 5px 20px rgba(0,0,0,0.4);
                font-size: 20px;
                background: rgba(13, 22, 34, 0.6);
            }
            .right-btn { right: 20px; }
            .left-btn { left: 20px; margin-left: 60px; }
            
            .fullscreen-btn {
                bottom: 25px;
                left: 15px;
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()" title="منو">&#9776;</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">فهرست اجزاء</div>
        
        <button id="downloadBtn" class="offline-btn" onclick="downloadAllPages()">دانلود کامل آفلاین</button>
        <div id="progressText" class="progress-text">در حال دانلود...</div>

        <div id="juzList"></div>
    </div>

    <div class="main-content">
        <button class="nav-btn right-btn" onclick="prevPage()" title="صفحه قبل">&#10094;</button>

        <div class="quran-container">
            <img id="rightPage" class="page" alt="صفحه راست">
            <img id="leftPage" class="page" alt="صفحه چپ">
        </div>

        <button class="nav-btn left-btn" onclick="nextPage()" title="صفحه بعد">&#10095;</button>
        
        <button class="fullscreen-btn" onclick="toggleFullScreen()" title="تمام صفحه">⤢</button>
    </div>

    <script>
        const totalPages = 623;
        let currentPage = 1;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker ثبت شد', reg))
                    .catch(err => console.log('خطا در ثبت Service Worker', err));
            });
        }

        async function downloadAllPages() {
            const btn = document.getElementById('downloadBtn');
            const progress = document.getElementById('progressText');
            
            btn.disabled = true;
            btn.innerText = "لطفا صبر کنید...";
            progress.style.display = "block";

            try {
                const cache = await caches.open('quran-cache-v1');
                let downloadedCount = 0;
                
                const batchSize = 20; 
                for (let i = 1; i <= totalPages; i += batchSize) {
                    const promises = [];
                    for (let j = 0; j < batchSize && (i + j) <= totalPages; j++) {
                        let pageNum = formatPageNumber(i + j);
                        let imgUrl = `Quran${pageNum}.jpg`;
                        
                        promises.push(
                            fetch(imgUrl).then(response => {
                                if (response.ok) {
                                    return cache.put(imgUrl, response);
                                }
                            })
                        );
                    }
                    await Promise.all(promises);
                    downloadedCount += promises.length;
                    progress.innerText = `دریافت: ${downloadedCount} از ${totalPages}`;
                }

                progress.innerText = "دانلود تکمیل شد!";
                btn.innerText = "آماده کار آفلاین";
                progress.style.color = "#4ade80";
            } catch (error) {
                console.error("خطا در دانلود:", error);
                progress.innerText = "خطا در دانلود، اینترنت را چک کنید.";
                progress.style.color = "#f87171";
                btn.disabled = false;
                btn.innerText = "تلاش مجدد";
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function toPersianNum(num) {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return num.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        const juzListDiv = document.getElementById("juzList");
        for (let i = 1; i <= 30; i++) {
            let startPage;
            if (i === 30) {
                startPage = 587; 
            } else {
                startPage = 3 + ((i - 1) * 20);
            }
            
            let btn = document.createElement("button");
            btn.className = "juz-btn";
            btn.innerText = "جزء " + toPersianNum(i);
            
            btn.onclick = function() {
                let targetPage = startPage;
                if (targetPage % 2 === 0) {
                    targetPage -= 1; 
                }
                currentPage = targetPage;
                updatePages();
                
                document.getElementById('sidebar').classList.remove('open');
            };
            juzListDiv.appendChild(btn);
        }

        function formatPageNumber(num) {
            return String(num).padStart(3, '0');
        }

        function updatePages() {
            let rightPageNum = currentPage;
            if (rightPageNum % 2 === 0) {
                rightPageNum -= 1;
            }

            document.getElementById("rightPage").src = "Quran" + formatPageNumber(rightPageNum) + ".jpg";
            
            let leftPageNum = rightPageNum + 1;
            if (leftPageNum <= totalPages) {
                document.getElementById("leftPage").src = "Quran" + formatPageNumber(leftPageNum) + ".jpg";
                document.getElementById("leftPage").style.display = "block";
            } else {
                document.getElementById("leftPage").style.display = "none";
            }
            
            currentPage = rightPageNum;
            
            localStorage.setItem('lastQuranPage', currentPage);
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextPage() {
            if (currentPage + 2 <= totalPages) {
                currentPage += 2;
                updatePages();
            }
        }

        function prevPage() {
            if (currentPage - 2 >= 1) {
                currentPage -= 2;
                updatePages();
            } else if (currentPage === 2) {
                currentPage = 1;
                updatePages();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                nextPage(); 
            } else if (event.key === 'ArrowRight') {
                prevPage(); 
            }
        });

        window.onload = function() {
            let savedPage = localStorage.getItem('lastQuranPage');
            if (savedPage) {
                currentPage = parseInt(savedPage, 10);
            }
            updatePages();
            
            caches.open('quran-cache-v1').then(cache => {
                cache.match('Quran001.jpg').then(response => {
                    if (response) {
                        const btn = document.getElementById('downloadBtn');
                        btn.innerText = "آماده کار آفلاین";
                        btn.disabled = true;
                    }
                });
            });
        };
    </script>
</body>
</html>
