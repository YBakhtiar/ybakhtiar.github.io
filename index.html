<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القرآن الكريم</title>
    <!-- PWA & manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FDF8F0" id="theme-color-meta">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="القرآن">
    <!-- فونت‌ها -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* تم زرد (پیش‌فرض) */
        :root {
            --bg-primary: #FDF8F0;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F0EAE0;
            --bg-elevated: rgba(255, 255, 255, 0.88);
            --text-primary: #2D1F14;
            --text-secondary: #5A4030;
            --text-muted: #8C7A65;
            --border-light: rgba(160, 130, 90, 0.15);
            --border-hover: rgba(160, 130, 90, 0.3);
            --border-decorative: rgba(200, 169, 81, 0.25);
            --accent: #B8860B;
            --accent-hover: #D4A017;
            --accent-soft: rgba(184, 134, 11, 0.1);
            --danger: #C0392B;
            --danger-soft: rgba(192, 57, 43, 0.1);
            --success: #27AE60;
            --modal-bg: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.82);
            --pattern-opacity: 0.03;
            --shadow-soft: 0 2px 12px rgba(80, 50, 20, 0.08);
            --shadow-md: 0 8px 24px rgba(80, 50, 20, 0.12);
            --shadow-lg: 0 16px 40px rgba(80, 50, 20, 0.16);
            --shadow-page: 0 8px 32px rgba(80, 50, 20, 0.2);
        }

        /* تم زرد - شب */
        body.theme-zard.night-mode {
            --bg-primary: #0F1923;
            --bg-secondary: #1A2B3E;
            --bg-tertiary: #243548;
            --bg-elevated: rgba(26, 43, 62, 0.92);
            --text-primary: #E8DED0;
            --text-secondary: #C8B89A;
            --text-muted: #8A7A60;
            --border-light: rgba(200, 180, 140, 0.12);
            --border-hover: rgba(200, 180, 140, 0.25);
            --border-decorative: rgba(212, 175, 55, 0.25);
            --accent: #D4AF37;
            --accent-hover: #E8C84A;
            --accent-soft: rgba(212, 175, 55, 0.12);
            --danger: #E74C3C;
            --danger-soft: rgba(231, 76, 60, 0.15);
            --success: #2ECC71;
            --modal-bg: #1A2B3E;
            --card-bg: rgba(26, 43, 62, 0.88);
        }

        /* تم زرد - dark-ui (فقط روز) */
        body.theme-zard.dark-ui:not(.night-mode) {
            --bg-primary: #1A2538;
            --bg-secondary: #253548;
            --bg-tertiary: #2F4058;
            --bg-elevated: rgba(37, 53, 72, 0.92);
            --text-primary: #E0D8CC;
            --text-secondary: #B8A890;
            --text-muted: #807060;
            --border-light: rgba(200, 180, 140, 0.1);
            --border-hover: rgba(200, 180, 140, 0.2);
            --border-decorative: rgba(184, 134, 11, 0.2);
            --accent: #D4AF37;
            --accent-hover: #E8C84A;
            --accent-soft: rgba(212, 175, 55, 0.12);
            --modal-bg: #253548;
            --card-bg: rgba(37, 53, 72, 0.88);
        }

        /* تم آبی */
        body.theme-abi {
            --bg-primary: #f0f7ff;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e6f0fa;
            --bg-elevated: rgba(255, 255, 255, 0.88);
            --text-primary: #1e2a44;
            --text-secondary: #2d3a5e;
            --text-muted: #5b6f8c;
            --border-light: rgba(0, 50, 100, 0.1);
            --border-hover: rgba(0, 80, 150, 0.2);
            --border-decorative: rgba(43, 110, 217, 0.2);
            --accent: #2b6ed9;
            --accent-hover: #4f9eff;
            --accent-soft: rgba(43, 110, 217, 0.12);
            --danger: #d14545;
            --danger-soft: rgba(209, 69, 69, 0.1);
            --success: #28a745;
            --modal-bg: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.82);
        }

        body.theme-abi.night-mode {
            --bg-primary: #0b1424;
            --bg-secondary: #1f2a40;
            --bg-tertiary: #2a3650;
            --bg-elevated: rgba(31, 42, 64, 0.92);
            --text-primary: #f0f4ff;
            --text-secondary: #d0dcff;
            --text-muted: #a0b0d0;
            --border-light: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            --border-decorative: rgba(79, 158, 255, 0.25);
            --accent: #4f9eff;
            --accent-hover: #7bb3ff;
            --accent-soft: rgba(79, 158, 255, 0.2);
            --danger: #ff6b6b;
            --danger-soft: rgba(255, 107, 107, 0.15);
            --success: #51cf66;
            --modal-bg: #1f2a40;
            --card-bg: rgba(31, 42, 64, 0.88);
        }

        body.theme-abi.dark-ui:not(.night-mode) {
            --bg-primary: #1a2538;
            --bg-secondary: #2c3a50;
            --bg-tertiary: #3a4a64;
            --bg-elevated: rgba(44, 58, 80, 0.92);
            --text-primary: #eef2f8;
            --text-secondary: #cbd5e8;
            --text-muted: #9aafcc;
            --border-light: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            --border-decorative: rgba(79, 158, 255, 0.2);
            --accent: #4f9eff;
            --accent-hover: #7bb3ff;
            --accent-soft: rgba(79, 158, 255, 0.2);
            --modal-bg: #2c3a50;
            --card-bg: rgba(44, 58, 80, 0.88);
        }

        /* فیلتر شب ثابت */
        body.night-mode {
            --image-filter: invert(0.9) brightness(1.1) contrast(1.05) hue-rotate(180deg);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            overscroll-behavior-y: contain;
            touch-action: none;
            transition: background-color 0.4s ease, color 0.4s ease;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: var(--pattern-opacity);
            background-image: radial-gradient(var(--accent) 0.6px, transparent 0.6px);
            background-size: 22px 22px;
            transition: opacity 0.4s;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* دکمه‌های شناور */
        .float-btn {
            position: fixed;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 46px;
            height: 46px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.25s ease;
            box-shadow: var(--shadow-soft);
        }
        .float-btn:hover, .float-btn:active {
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md), 0 0 0 4px var(--accent-soft);
        }
        .float-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .btn-menu { top: 18px; right: 18px; }
        .btn-settings { top: 18px; left: 18px; }
        .btn-download { bottom: 18px; right: 18px; }
        .btn-download.done { display: none; }
        .btn-fullscreen { bottom: 18px; left: 18px; }

        /* مودال‌ها */
        .overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: overlayIn 0.25s ease;
            z-index: 2500;
        }
        .overlay.active { display: flex; }

        .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-card {
            position: relative;
            z-index: 1;
            background: var(--modal-bg);
            border: 1px solid var(--border-light);
            border-radius: 28px;
            padding: 28px;
            max-width: 420px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            color: var(--text-primary);
            animation: cardIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 20px;
            font-weight: 600;
        }
        .modal-header svg { width: 22px; height: 22px; fill: var(--accent); flex-shrink: 0; }

        .close-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: transparent;
            color: var(--text-muted);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .close-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* دیالوگ سفارشی */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 16px;
            animation: overlayIn 0.2s ease;
        }
        .dialog-overlay .overlay-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .dialog-card {
            position: relative;
            z-index: 1;
            background: var(--modal-bg);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 28px;
            max-width: 360px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            animation: cardIn 0.25s ease;
        }
        .dialog-title {
            font-family: 'Vazirmatn', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .dialog-message {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 24px;
        }
        .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .dialog-btn {
            padding: 10px 22px;
            border-radius: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .dialog-btn-ok {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .dialog-btn-ok:hover { background: var(--accent-hover); }
        .dialog-btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border-light);
        }
        .dialog-btn-cancel:hover { background: var(--bg-tertiary); }

        /* اسپلش */
        .splash-overlay {
            z-index: 3000;
            background: var(--bg-primary);
        }
        .splash-overlay .overlay-backdrop { background: transparent; backdrop-filter: none; }

        .splash-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-decorative);
            border-radius: 40px;
            padding: 48px 32px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: splashIn 0.5s ease;
        }

        @keyframes splashIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .splash-title {
            font-family: 'Amiri', serif;
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8B6914, var(--accent-hover));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .splash-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 16px auto 20px;
            max-width: 240px;
            color: var(--accent);
            font-size: 14px;
        }
        .splash-divider::before, .splash-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .splash-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .splash-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: var(--shadow-soft);
        }
        .splash-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .splash-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }
        .splash-btn-primary {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .splash-link {
            margin-top: 28px;
            font-size: 12px;
            opacity: 0.6;
        }
        .splash-link a {
            color: var(--text-muted);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .splash-link a:hover { color: var(--accent); }
        .splash-link svg { width: 15px; height: 15px; fill: currentColor; }

        /* JUZ/Surah overlay با تب */
        .juz-overlay { z-index: 2500; }
        .juz-card {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-decorative);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 480px;
            width: 100%;
            max-height: 82vh;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            animation: cardIn 0.3s ease;
        }
        .juz-continue-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .juz-continue-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .juz-continue-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        /* تب‌های اجزاء/سوره‌ها */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .tab-btn.active {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tab-content {
            overflow-y: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            padding: 4px;
        }
        .juz-grid, .surah-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .surah-grid {
            grid-template-columns: repeat(2, 1fr); /* برای سوره‌ها دو ستون */
        }
        .juz-item, .surah-item {
            padding: 14px 8px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
            line-height: 1.4;
        }
        .juz-item:hover, .surah-item:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        /* تنظیمات - طراحی جدید */
        .settings-section {
            margin-bottom: 28px;
        }
        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            padding-right: 6px;
            text-transform: uppercase;
        }

        .theme-selector-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .theme-selector-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 4px;
            border-radius: 16px;
            border: 2px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .theme-selector-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        .theme-selector-btn.active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }
        .theme-selector-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            opacity: 0.9;
        }

        .language-selector-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .lang-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 0;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
        }
        .lang-btn.active {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }
        .lang-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .settings-btn-row {
            width: 100%;
            padding: 16px 18px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            backdrop-filter: blur(4px);
        }
        .settings-btn-row svg { width: 20px; height: 20px; fill: currentColor; }
        .settings-btn-row:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .settings-btn-row.accent {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
        }
        .settings-btn-row.danger {
            border-color: var(--danger);
            background: var(--danger-soft);
            color: var(--danger);
        }

        /* دکمه‌های دانلود (مودال) */
        .dl-option {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
        }
        .dl-option:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .dl-option .dl-main { font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dl-option .dl-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .progress-pill {
            position: fixed;
            bottom: 72px;
            right: 18px;
            background: var(--bg-elevated);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 150;
        }

        /* main content */
        .main-content {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .quran-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            height: 96vh;
            width: 100%;
            padding: 0 56px;
            transition: opacity 0.15s ease;
        }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            max-width: 48%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-page);
            background: var(--bg-primary);
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }
        .page-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.04);
        }

        .page {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 16px;
            background-color: white;
            filter: var(--image-filter);
            transition: filter 0.4s ease, opacity 0.2s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .nav-btn {
            position: absolute;
            top: 0;
            height: 100%;
            width: 48px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 10;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            opacity: 1;
            background: linear-gradient(to var(--grad-dir, left), var(--bg-elevated), transparent);
            color: var(--accent);
        }
        .nav-btn svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-right { right: 0; --grad-dir: left; }
        .nav-left { left: 0; --grad-dir: right; }

        .page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 20px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid var(--border-light);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .page-indicator.visible { opacity: 1; }

        @media (max-width: 768px) {
            .quran-container { padding: 8px; gap: 0; }
            .page-wrapper { max-width: 100%; width: 100%; height: auto; border-radius: 12px; }
            .nav-btn { display: none !important; }
            .btn-fullscreen { display: none !important; }
            .float-btn { width: 42px; height: 42px; }
            .juz-grid { grid-template-columns: repeat(2, 1fr); }
            .surah-grid { grid-template-columns: repeat(2, 1fr); }
        }

        // ================== دیالوگ سفارشی ==================
        function showDialogConfirm(message, title) {
            return new Promise(function(resolve) {
                const overlay = document.createElement('div');
                overlay.className = 'dialog-overlay';
                overlay.innerHTML = `
                    <div class="overlay-backdrop"></div>
                    <div class="dialog-card">
                        <div class="dialog-title">${title}</div>
                        <div class="dialog-message">${message}</div>
                        <div class="dialog-actions">
                            <button class="dialog-btn dialog-btn-cancel" data-action="cancel">${translations[currentLang].cancel}</button>
                            <button class="dialog-btn dialog-btn-ok" data-action="ok">${translations[currentLang].confirmDeleteTitle === 'تأیید' ? 'تأیید' : 'OK'}</button>
                        </div>
                    </div>
                `;
                function cleanup(result) {
                    overlay.remove();
                    resolve(result);
                }
                overlay.querySelector('[data-action="ok"]').addEventListener('click', () => cleanup(true));
                overlay.querySelector('[data-action="cancel"]').addEventListener('click', () => cleanup(false));
                overlay.querySelector('.overlay-backdrop').addEventListener('click', () => cleanup(false));
                document.body.appendChild(overlay);
            });
        }

        // ================== توابع کمکی ==================
        function toPersianNum(num) {
            const digits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
            return num.toString().replace(/\d/g, d => digits[d]);
        }

        function toEnglishNum(str) { return str; }

        function formatPageNumber(num) { return String(num).padStart(3, '0'); }

        function showPageIndicator() {
            const el = document.getElementById('pageIndicator');
            const isMobile = window.innerWidth <= 768;
            let displayPage;
            if (isMobile) {
                displayPage = currentPage;
            } else {
                displayPage = (currentPage % 2 !== 0) ? currentPage : currentPage - 1;
            }
            const pageZeroBased = displayPage - 1;
            const pageText = translations[currentLang].page + ' ' + (currentLang === 'fa' ? toPersianNum(pageZeroBased) : pageZeroBased);
            el.textContent = pageText;
            el.classList.add('visible');
            clearTimeout(indicatorTimer);
            indicatorTimer = setTimeout(() => el.classList.remove('visible'), 2200);
        }

        // ================== مدیریت صفحات و کش ==================
        async function loadPageImage(imgId, urlPath, side) {
            const img = document.getElementById(imgId);
            if (!img) return;
            if (objectUrls[side]) { URL.revokeObjectURL(objectUrls[side]); objectUrls[side] = null; }
            try {
                const cache = await caches.open('quran-cache-v1');
                const response = await cache.match(urlPath);
                if (response) {
                    const blob = await response.blob();
                    const objUrl = URL.createObjectURL(blob);
                    objectUrls[side] = objUrl;
                    img.src = objUrl;
                } else {
                    img.src = urlPath;
                }
            } catch {
                img.src = urlPath;
            }
        }

        function updatePages() {
            resetZoom();
            const isMobile = window.innerWidth <= 768;
            const rightW = document.getElementById('rightWrapper');
            const leftW = document.getElementById('leftWrapper');

            if (isMobile) {
                const url = 'images/Quran' + formatPageNumber(currentPage) + '.jpg';
                loadPageImage('rightPage', url, 'right');
                leftW.style.display = 'none';
                rightW.style.display = 'flex';
            } else {
                let rightPN = (currentPage % 2 !== 0) ? currentPage : currentPage - 1;
                let leftPN = rightPN + 1;
                loadPageImage('rightPage', 'images/Quran' + formatPageNumber(rightPN) + '.jpg', 'right');
                if (leftPN <= totalPages) {
                    loadPageImage('leftPage', 'images/Quran' + formatPageNumber(leftPN) + '.jpg', 'left');
                    leftW.style.display = 'flex';
                } else {
                    leftW.style.display = 'none';
                }
                rightW.style.display = 'flex';
                if (currentPage % 2 === 0) currentPage = rightPN;
            }
            localStorage.setItem('lastQuranPage', currentPage.toString());
            if (window.location.protocol !== 'file:') history.replaceState(null, null, '#' + currentPage);
            showPageIndicator();
        }

        function resetZoom() {
            currentScale = 1;
            translateX = 0; translateY = 0;
            lastTranslateX = 0; lastTranslateY = 0;
            applyTransform(true);
        }
        function applyTransform(smooth) {
            const rightW = document.getElementById('rightWrapper');
            const leftW = document.getElementById('leftWrapper');
            const t = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
            [rightW, leftW].forEach(w => {
                if (w) {
                    w.style.transition = smooth ? 'transform 0.3s ease-out' : 'none';
                    w.style.transform = t;
                }
            });
        }

        function nextPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage + step <= totalPages) currentPage += step;
            else if (currentPage < totalPages) currentPage++;
            else return;
            document.getElementById('quranContainer').style.opacity = '0.4';
            setTimeout(() => { updatePages(); document.getElementById('quranContainer').style.opacity = '1'; }, 120);
        }
        function prevPage() {
            let step = window.innerWidth <= 768 ? 1 : 2;
            if (currentPage - step >= 1) currentPage -= step;
            else if (currentPage > 1) currentPage--;
            else return;
            document.getElementById('quranContainer').style.opacity = '0.4';
            setTimeout(() => { updatePages(); document.getElementById('quranContainer').style.opacity = '1'; }, 120);
        }

        // ================== دانلود و کش ==================
        async function startDownload(quality) {
            closeOverlay('downloadOverlay');
            let sizeText = quality === 'hq' ? '۵۰۰ مگابایت' : '۷۰ مگابایت';
            let msg = translations[currentLang].confirmDownloadMsg.replace('{size}', sizeText);
            let confirmed = await showDialogConfirm(msg, translations[currentLang].confirmDownloadTitle);
            if (!confirmed) return;

            const dlBtn = document.getElementById('btnDownload');
            const progress = document.getElementById('progressPill');
            dlBtn.style.pointerEvents = 'none';
            dlBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor"/></svg>';
            progress.style.display = 'block';
            progress.textContent = 'در حال دانلود...';

            try {
                const cache = await caches.open('quran-cache-v1');
                let downloaded = 0;
                const batch = 10;
                for (let i = 1; i <= totalPages; i += batch) {
                    const promises = [];
                    for (let j = 0; j < batch && i + j <= totalPages; j++) {
                        let pageNum = String(i + j).padStart(3, '0');
                        let fileName = 'Quran' + pageNum + '.jpg';
                        let cacheKey = 'images/' + fileName;
                        let fetchUrl = quality === 'hq' ? GITHUB_BASE + fileName : cacheKey;
                        promises.push(
                            fetch(fetchUrl, { cache: 'reload' })
                                .then(resp => resp.ok ? cache.put(cacheKey, resp.clone()) : null)
                                .catch(() => null)
                        );
                    }
                    await Promise.all(promises);
                    downloaded += batch;
                    progress.textContent = 'پیشرفت: ' + toPersianNum(Math.min(downloaded, totalPages)) + ' از ' + toPersianNum(totalPages);
                }
                setDownloadedUI();
                alert(translations[currentLang].standard === 'استاندارد (۷۰ مگابایت)' ? 'دانلود با موفقیت انجام شد!' : 'Download completed successfully!');
                updatePages();
            } catch (err) {
                progress.textContent = '❌ خطا در دانلود';
                dlBtn.style.pointerEvents = 'auto';
                dlBtn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>';
            }
        }

        function setDownloadedUI() {
            const btn = document.getElementById('btnDownload');
            const prog = document.getElementById('progressPill');
            if (btn) { btn.style.display = 'none'; btn.classList.add('done'); }
            if (prog) prog.style.display = 'none';
            isDownloaded = true;
        }
        function resetDownloadedUI() {
            const btn = document.getElementById('btnDownload');
            if (btn) {
                btn.style.display = 'flex';
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>';
                btn.style.pointerEvents = 'auto';
                btn.classList.remove('done');
            }
            isDownloaded = false;
        }

            const prog = document.getElementById('progressPill');

        document.getElementById('navRight').addEventListener('click', prevPage);
        document.getElementById('navLeft').addEventListener('click', nextPage);
        document.getElementById('splashContinue').addEventListener('click', () => closeOverlay('splashOverlay'));
        document.getElementById('splashJuzList').addEventListener('click', () => { closeOverlay('splashOverlay'); openOverlay('juzOverlay'); });
        document.getElementById('juzContinueBtn').addEventListener('click', () => closeOverlay('juzOverlay'));

        // تنظیمات
        document.getElementById('themeToggle').addEventListener('click', toggleThemeMode);
        document.getElementById('darkUiToggle').addEventListener('click', toggleDarkUI);
        document.getElementById('settingsClose').addEventListener('click', () => closeOverlay('settingsOverlay'));
        document.getElementById('deleteOfflineBtn').addEventListener('click', deleteOfflineFiles);
        document.getElementById('themeZardBtn').addEventListener('click', () => setThemeStyle('zard'));
        document.getElementById('themeAbiBtn').addEventListener('click', () => setThemeStyle('abi'));

        // زبان
        document.getElementById('langFa').addEventListener('click', () => setLanguage('fa'));
        document.getElementById('langAr').addEventListener('click', () => setLanguage('ar'));
        document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));

        // دانلود
        document.getElementById('dlStandard').addEventListener('click', () => startDownload('standard'));
        document.getElementById('dlHQ').addEventListener('click', () => startDownload('hq'));
        document.getElementById('downloadClose').addEventListener('click', () => closeOverlay('downloadOverlay'));

        // تب‌ها
        const tabJuz = document.getElementById('tabJuzBtn');
        const tabSurah = document.getElementById('tabSurahBtn');
        const contentJuz = document.getElementById('juzTabContent');
        const contentSurah = document.getElementById('surahTabContent');
        tabJuz.addEventListener('click', () => {
            tabJuz.classList.add('active');
            tabSurah.classList.remove('active');
            contentJuz.style.display = 'block';
            contentSurah.style.display = 'none';
        });
        tabSurah.addEventListener('click', () => {
            tabSurah.classList.add('active');
            tabJuz.classList.remove('active');
            contentSurah.style.display = 'block';
            contentJuz.style.display = 'none';
            rebuildSurahGrid(); // اطمینان از نمایش با زبان جاری
        });

        // بستن مودال‌ها با کلیک روی backdrop
        ['juzOverlay', 'settingsOverlay', 'downloadOverlay'].forEach(id => {
            const el = document.getElementById(id);
            el.querySelector('.overlay-backdrop').addEventListener('click', () => closeOverlay(id));
        });

        // ================== رویدادهای لمسی ==================
        const swipeArea = document.getElementById('swipeArea');
        let touchstartX = 0, touchstartY = 0, touchendX = 0, touchendY = 0, touchStartTime = 0;
        swipeArea.addEventListener('touchstart', e => {
            if (e.touches.length >= 2) {
                initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                isPanning = false;
            } else if (e.touches.length === 1) {
                touchstartX = e.touches[0].clientX; touchstartY = e.touches[0].clientY;
                touchStartTime = Date.now(); hasMoved = false;
                if (currentScale > 1) isPanning = true;
            }
        }, { passive: false });
        swipeArea.addEventListener('touchmove', e => {
            e.preventDefault(); hasMoved = true;
            if (e.touches.length >= 2 && initialPinchDistance) {
                let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                currentScale = Math.min(Math.max(1, currentScale * (dist / initialPinchDistance)), 4);
                initialPinchDistance = dist;
                applyTransform(false);
            } else if (e.touches.length === 1 && isPanning && currentScale > 1) {
                translateX = lastTranslateX + (e.touches[0].clientX - touchstartX);
                translateY = lastTranslateY + (e.touches[0].clientY - touchstartY);
                applyTransform(false);
            }
        }, { passive: false });
        swipeArea.addEventListener('touchend', e => {
            if (e.touches.length > 0) {
                initialPinchDistance = null;
                if (e.touches.length === 1 && currentScale > 1) {
                    touchstartX = e.touches[0].clientX; touchstartY = e.touches[0].clientY;
                    lastTranslateX = translateX; lastTranslateY = translateY; isPanning = true;
                }
                return;
            }
            initialPinchDistance = null;
            if (isPanning) { lastTranslateX = translateX; lastTranslateY = translateY; isPanning = false; }
            if (!hasMoved) {
                let now = Date.now();
                if (now - lastTapTime < 300 && now - lastTapTime > 0) { resetZoom(); lastTapTime = 0; return; }
                lastTapTime = now;
            } else lastTapTime = 0;

            if (currentScale <= 1.05 && e.changedTouches.length === 1 && hasMoved) {
                touchendX = e.changedTouches[0].clientX; touchendY = e.changedTouches[0].clientY;
                let diffX = Math.abs(touchendX - touchstartX), diffY = Math.abs(touchendY - touchstartY);
                let timeDiff = Date.now() - touchStartTime;
                if (diffX > 80 && diffX > diffY * 2 && timeDiff < 600) {
                    if (touchendX > touchstartX) nextPage(); else prevPage();
                }
            }
        }, { passive: false });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); nextPage(); }
            if (e.key === 'ArrowRight') { e.preventDefault(); prevPage(); }
        });

        window.addEventListener('resize', updatePages);
        window.addEventListener('orientationchange', () => setTimeout(updatePages, 50));

        // ================== مقداردهی اولیه ==================
        (function init() {
            applyTheme();
            setLanguage(currentLang);
            buildJuzGrid();
            rebuildSurahGrid();
            let saved = localStorage.getItem('lastQuranPage');
            if (saved && !isNaN(parseInt(saved))) currentPage = parseInt(saved);
            updatePages();
            caches.open('quran-cache-v1').then(cache => {
                cache.match('images/Quran001.jpg').then(res => { if (res) setDownloadedUI(); });
            });
        })();
    </script>
</body>
</html>
